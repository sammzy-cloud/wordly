<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dictionary</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>My Dictionary</h1>
    <p>Your easy to use reference tool for beginners and highly experienced English learners.</p>
  </header>
    <main>
      <div id = "search-conatiner">
        <form id="dictionary-form">
         <label for="word">Search for a word here:</label>
         <input type="text" id="word" placeholder="Enter a word" required>
         <button id = "search-button" type="submit">Search</button>
        </form>
      </div> 
      <div class = "content-container">
        <section id = "result">
          <h2>Results</h2>
          <div id="loading-message"></div>
          <p id="error-message"></p>
          <h3 id = "word-title"></h3>
          <p id = "pronunciation"></p>
          <p id = "part-of-speech"></p>
          <p id = "definition"></p>
          <p id = "example"></p>     
          <p id ="source-container">Source:<a id="source-link" href="#" target="_blank"></a></p>
          <ul id = "synonyms-list">Synonyms</ul>
          <div class="button-container">
            <button id="audio-button" type="button">Play Pronunciation</button>
            <button id="favourite-button" type="button">Favourite</button>
          </div>
        </section>
        <section id = "favourites">
          <h2>Favourite Words</h2>
          <ul id = "favourites-list"></ul>
        </section>
      </div>
    </main>
    <script src="index.js"></script>
  </body>
</html>
